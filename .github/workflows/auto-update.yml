name: Auto Update

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (patch / minor / major)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      force:
        description: 'Force publish even if no WA changes detected'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --no-lockfile

      - name: Update WhatsApp Web version
        run: yarn update:version

      - name: Update WAProto (extract + sync modules + build types)
        run: yarn update:proto
        continue-on-error: true

      - name: Sync WAProto per-module wrappers
        run: yarn sync:proto
        continue-on-error: true

      - name: Commit, push, and publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add lib/Defaults/yebail-version.json lib/Defaults/index.js \
                  WAProto/ scripts/ package.json

          CHANGED=$(git diff --staged --quiet && echo "no" || echo "yes")

          if [ "$CHANGED" = "no" ] && [ "$FORCE" != "true" ]; then
            echo "No changes detected, skipping release."
            exit 0
          fi

          npm version "$BUMP" --no-git-tag-version
          git add package.json

          VERSION=$(node -p 'require("./package.json").version')
          git commit -m "chore: release v${VERSION} — WA update $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main

          echo "Publishing v${VERSION} to npm..."
          npm publish --access public
          echo "✓ Published @yemo-dev/yebail@${VERSION} to https://www.npmjs.com/package/@yemo-dev/yebail"
