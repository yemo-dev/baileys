name: Manual Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'Version increment (patch, minor, major, or specific version)'
        required: true
        default: 'patch'
      commit_text:
        description: 'Optional custom commit message'
        required: false
        default: ''
      example_only:
        description: 'Publish Example only (skip root package version/publish)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Increment version without creating a git tag
          if [ "${{ github.event.inputs.example_only }}" = "true" ]; then
            npm version ${{ github.event.inputs.increment }} --no-git-tag-version --prefix Example
            git add Example scripts
          else
            npm version ${{ github.event.inputs.increment }} --no-git-tag-version
            npm version ${{ github.event.inputs.increment }} --no-git-tag-version --prefix Example
            git add package.json Example scripts
          fi
          COMMIT_MESSAGE="${{ github.event.inputs.commit_text }}"
          if [ -z "$COMMIT_MESSAGE" ]; then
            if [ "${{ github.event.inputs.example_only }}" = "true" ]; then
              COMMIT_MESSAGE="chore: release example v$(node -p 'require(\"./Example/package.json\").version')"
            else
              COMMIT_MESSAGE="chore: release v$(node -p 'require(\"./package.json\").version') and example v$(node -p 'require(\"./Example/package.json\").version')"
            fi
          fi
          git commit -m "$COMMIT_MESSAGE"
          
          # Push changes without tags
          git push origin main
          
          # Publish to npm
          if [ "${{ github.event.inputs.example_only }}" = "true" ]; then
            (
              cd Example
              npm publish --access public
            )
          else
            npm publish --access public
            (
              cd Example
              npm publish --access public
            )
          fi
