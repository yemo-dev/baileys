syntax = "proto3";
package proto;

/// WhatsApp Version: 2.3000.1037160418

message BizIdentityInfo {
    optional BizIdentityInfo.VerifiedLevelValue vlevel = 1;
    optional uint32 vnameCert = 2;
    optional bool signed = 3;
    optional bool revoked = 4;
    optional BizIdentityInfo.HostStorageType hostStorage = 5;
    optional BizIdentityInfo.ActualActorsType actualActors = 6;
    optional uint64 privacyModeTs = 7;
    optional uint64 featureControls = 8;
    enum VerifiedLevelValue {
        UNKNOWN = 0;
        LOW = 1;
        HIGH = 2;
    }
    enum HostStorageType {
        ON_PREMISE = 0;
        FACEBOOK = 1;
    }
    enum ActualActorsType {
        SELF = 0;
        BSP = 1;
    }
}
