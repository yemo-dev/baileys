syntax = "proto3";
package proto;

/// WhatsApp Version: 2.3000.1037160418

message BotModelMetadata {
    optional BotModelMetadata.ModelType modelType = 1;
    optional BotModelMetadata.PremiumModelStatus premiumModelStatus = 2;
    optional string modelNameOverride = 3;
    enum ModelType {
        UNKNOWN_TYPE = 0;
        LLAMA_PROD = 1;
        LLAMA_PROD_PREMIUM = 2;
    }
    enum PremiumModelStatus {
        UNKNOWN_STATUS = 0;
        AVAILABLE = 1;
        QUOTA_EXCEED_LIMIT = 2;
    }
}
