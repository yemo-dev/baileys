syntax = "proto3";
package proto;

/// WhatsApp Version: 2.3000.1037160418

message BotReminderMetadata {
    optional uint32 requestMessageKey = 1;
    optional BotReminderMetadata.ReminderAction action = 2;
    optional string name = 3;
    optional uint64 nextTriggerTimestamp = 4;
    optional BotReminderMetadata.ReminderFrequency frequency = 5;
    enum ReminderAction {
        NOTIFY = 1;
        CREATE = 2;
        DELETE = 3;
        UPDATE = 4;
    }
    enum ReminderFrequency {
        ONCE = 1;
        DAILY = 2;
        WEEKLY = 3;
        BIWEEKLY = 4;
        MONTHLY = 5;
    }
}
