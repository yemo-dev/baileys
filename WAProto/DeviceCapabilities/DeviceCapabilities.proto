syntax = "proto3";
package proto;

/// WhatsApp Version: 2.3000.1037160418

message DeviceCapabilities {
    optional DeviceCapabilities.ChatLockSupportLevel chatLockSupportLevel = 1;
    optional DeviceCapabilities.ILIDMigration lidMigration = 2;
    optional DeviceCapabilities.IBusinessBroadcast businessBroadcast = 3;
    optional DeviceCapabilities.IUserHasAvatar userHasAvatar = 4;
    optional DeviceCapabilities.MemberNameTagPrimarySupport memberNameTagPrimarySupport = 5;
    optional DeviceCapabilities.IAiThread aiThread = 6;
    enum ChatLockSupportLevel {
        NONE = 0;
        MINIMAL = 1;
        FULL = 2;
    }
    enum MemberNameTagPrimarySupport {
        DISABLED = 0;
        RECEIVER_ENABLED = 1;
        SENDER_ENABLED = 2;
    }
}
