syntax = "proto3";
package proto;

/// WhatsApp Version: 2.3000.1037160418

message MediaRetryNotification {
    optional string stanzaId = 1;
    optional string directPath = 2;
    optional MediaRetryNotification.ResultType result = 3;
    optional bytes messageSecret = 4;
    enum ResultType {
        GENERAL_ERROR = 0;
        SUCCESS = 1;
        NOT_FOUND = 2;
        DECRYPTION_ERROR = 3;
    }
}
