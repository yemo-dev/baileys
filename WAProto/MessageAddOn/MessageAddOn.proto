syntax = "proto3";
package proto;

/// WhatsApp Version: 2.3000.1037160418

message MessageAddOn {
    optional MessageAddOn.MessageAddOnType messageAddOnType = 1;
    optional uint32 messageAddOn = 2;
    optional int64 senderTimestampMs = 3;
    optional int64 serverTimestampMs = 4;
    optional int32 status = 5;
    optional uint32 addOnContextInfo = 6;
    optional uint32 messageAddOnKey = 7;
    optional uint32 legacyMessage = 8;
    enum MessageAddOnType {
        UNDEFINED = 0;
        REACTION = 1;
        EVENT_RESPONSE = 2;
        POLL_UPDATE = 3;
        PIN_IN_CHAT = 4;
    }
}
